<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目成果 - 四川省人民医院 | 整合式智慧慢病管理模式研究</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 成果板块样式 */
        .research-section {
            margin-bottom: 4vh;
        }

        .section-title {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: #8B0000;
            border-left: 0.3vw solid #8B0000;
            padding-left: 1vw;
            margin: 2vh 0 2vh 0;
        }

        /* 成果容器 */
        .results-cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2vw;
            margin: 2vh 0;
            min-height: 200px;
        }

        /* 成果卡片 */
        .result-card {
            flex: 1;
            min-width: 240px;
            max-width: 300px;
            background: #fff;
            border-radius: 1.2vw;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border: 1px solid #eee;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* 卡片图片区域 */
        .card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
        }

        /* 卡片标题 */
        .card-title {
            padding: 1rem;
            font-size: clamp(0.85rem, 1.2vw, 0.95rem);
            font-weight: 500;
            color: #333;
            line-height: 1.4;
            text-align: center;
            border-top: 1px solid #f0f0f0;
            background: #fff;
        }

        /* 空状态样式 */
        .empty-state {
            width: 100%;
            text-align: center;
            padding: 4rem 2rem;
            color: #999;
            background: #fafafa;
            border-radius: 1vw;
            border: 1px dashed #ddd;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.9rem;
        }

        /* 添加按钮 */
        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #8B0000;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .add-btn:hover {
            background: #a00000;
            transform: translateY(-1px);
        }

        /* 返回按钮区域调整 */
        .back-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .results-cards-container {
                gap: 1rem;
                justify-content: center;
            }
        }
    </style>
</head>
<body class="sub-page">

    <header class="sub-header">
        <h1>整合式智慧慢病管理模式研究</h1>
        <p class="sub-header-subtitle">国家科技重大专项课题</p>
    </header>

    <nav class="sub-nav">
        <div class="sub-nav-container">
            <a href="index.html" class="sub-nav-item">首页</a>
            <a href="trends.html" class="sub-nav-item">研究动态</a>
            <a href="results.html" class="sub-nav-item">研究成果</a>
            <a href="plan.html" class="sub-nav-item">研究计划</a>
            <a href="teams.html" class="sub-nav-item">合作单位</a>
            <a href="members.html" class="sub-nav-item">项目人员</a>
        </div>
    </nav>

    <main class="sub-page-content">
        <!-- 返回按钮 -->
        <div class="back-button-container">
            <button onclick="history.back()" class="back-button">← 返回</button>
            <button class="add-btn" onclick="showAddPrompt()">+ 添加成果</button>
        </div>

        <h2>四川省医学科学院·四川省人民医院 - 项目成果</h2>
        
        <!-- 板块一：在研成果 -->
        <div class="research-section">
            <h3 class="section-title">📊 在研成果</h3>
            <div class="results-cards-container" id="ongoingContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">暂无在研成果，点击上方按钮添加</div>
                </div>
            </div>
        </div>

        <!-- 板块二：产出成果 -->
        <div class="research-section">
            <h3 class="section-title">📄 产出成果</h3>
            <div class="results-cards-container" id="outputContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📄</div>
                    <div class="empty-state-text">暂无产出成果，点击上方按钮添加</div>
                </div>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy;国家科技重大专项“重大慢病防治技术推广机制研究及应用示范”课题“整合式智慧慢病管理模式研究”（编号：2024ZD0523902）@四川大学华西公共卫生学院</p>
    </footer>

    <script>
        // 存储成果数据
        let ongoingResults = [];
        let outputResults = [];

        // 渲染成果列表
        function renderResults() {
            renderContainer('ongoingContainer', ongoingResults, 'ongoing');
            renderContainer('outputContainer', outputResults, 'output');
        }

        // 渲染单个容器
        function renderContainer(containerId, results, type) {
            const container = document.getElementById(containerId);
            
            if (results.length === 0) {
                const emptyIcon = type === 'ongoing' ? '📋' : '📄';
                const emptyText = type === 'ongoing' ? '暂无在研成果' : '暂无产出成果';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${emptyIcon}</div>
                        <div class="empty-state-text">${emptyText}，点击上方按钮添加</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = results.map((result, index) => `
                <div class="result-card" data-id="${result.id}">
                    <div class="card-image">
                        ${result.image ? `<img src="${result.image}" style="width:100%;height:100%;object-fit:cover;">` : 
                                         `<span style="opacity:0.6;">📷 待添加图片</span>`}
                    </div>
                    <div class="card-title">${result.title}</div>
                </div>
            `).join('');
        }

        // 添加成果
        function addResult(type, title, imageFile) {
            const newId = Date.now().toString();
            const newResult = {
                id: newId,
                title: title,
                image: null
            };
            
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    newResult.image = e.target.result;
                    if (type === 'ongoing') {
                        ongoingResults.push(newResult);
                    } else {
                        outputResults.push(newResult);
                    }
                    renderResults();
                };
                reader.readAsDataURL(imageFile);
            } else {
                if (type === 'ongoing') {
                    ongoingResults.push(newResult);
                } else {
                    outputResults.push(newResult);
                }
                renderResults();
            }
        }

        // 显示添加弹窗
        function showAddPrompt() {
            const type = confirm('添加在研成果？\n\n点击"确定"添加在研成果\n点击"取消"添加产出成果');
            
            const title = prompt('请输入成果名称：');
            if (!title || title.trim() === '') {
                alert('成果名称不能为空');
                return;
            }
            
            const hasImage = confirm('是否需要添加图片？\n\n点击"确定"选择图片\n点击"取消"暂不添加');
            
            if (hasImage) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        addResult(type ? 'ongoing' : 'output', title.trim(), file);
                        alert('成果添加成功！');
                    } else {
                        addResult(type ? 'ongoing' : 'output', title.trim(), null);
                        alert('成果添加成功！');
                    }
                };
                input.click();
            } else {
                addResult(type ? 'ongoing' : 'output', title.trim(), null);
                alert('成果添加成功！');
            }
        }

        // 初始化渲染
        renderResults();
    </script>
</body>
</html>
