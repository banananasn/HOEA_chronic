        /* 研究计划表格样式 */
        .plan-table-container {

            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .plan-table td {
            padding: 1rem;
            text-align: center;
            border: 1px solid #e0e0e0;
            color: #333;
            font-size: 0.95rem;
        }
        
        .plan-table tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        .plan-table tr:hover {
            background: #f0f0f0;
            transition: background 0.2s ease;
        }
        
        /* 手机端适配 */
        @media (max-width: 768px) {
            .plan-table th,
