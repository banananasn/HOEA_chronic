                        "<br><strong>二、刘潇霞老师介绍肿瘤防治工作</strong><br>&emsp;&emsp;肿瘤防治工作分数据与服务两条线，在数据层面，收集癌症发病的监测风险评估数据和死亡复发的随访数据，实现对人群健康状况的动态掌握与管理；在服务层面，依托医联体等省、市、县三级癌症防治体系形成互转机制，由社区卫生服务中心承担风险评估与居家随访，具备筛查资质的二级及以上医疗机构负责筛查、诊断与规范治疗，其中治疗环节涵盖主要治疗、支持性治疗与康复治疗，基层医疗机构参与部分支持性及康复服务，并进行向上转诊。",

    "<br><strong>二、杜春霖老师介绍整合式共病管理工作</strong><br>&emsp;&emsp;整合式路径的设计理念是将患者的就医需求转化为临床可执行的管理方案，聚焦三个核心维度：疾病类型（单病或共病）、病情严重程度（轻中重分层）、随访周期（短期与长期）。该路径不同于传统的临床路径或单纯的就医路径，而是强调“整合”概念，具体体现在以下几个方面：一是患病类型的整合，从单病逐步向共病延伸；二是路径类型的整合，将基于指南共识的标准化临床管理路径与基于医师医嘱的动态路径相结合；三是随访周期的整合，区分短期管理与长期随访。<br>&emsp;&emsp;在系统建设方面，目前已实现基于患者画像的动态路径生成功能。该功能以患者的就诊记录为数据源头，可自动生成个体化的离院后管理路径。但当前临床实践中存在一个突出问题：医师书写的动态路径多聚焦于短期随访，大量需要长期管理的慢性病患者在出院一年后缺乏系统性的管理安排，形成管理空白。在路径整合的具体规则方面，对于短期随访，当标准化临床路径与医师动态路径在时间节点上存在冲突时，系统将设定合并周期，对临近时间节点的任务和内容进行整合，避免对患者的重复提醒；对于长期随访，以标准化临床路径的管理要求为主。关于基层协作机制，杜老师提出了服务包模式的设想，由华西专家团队制定管理方案，基层医疗机构负责具体执行，收益按工作量进行分配。<br>&emsp;&emsp;当前以慢阻肺作为切入点，通过文献检索与AI工具辅助，初步整理出急性加重期、稳定期及合并其他疾病等不同类型的临床管理路径，后续将通过专家论证最终形成华西专家共识认证的标准化管理路径。考虑到慢阻肺患者群体规模庞大，传统的以人工为主的随访管理方式难以实现全覆盖，必须依托信息化系统进行数字化管理。共病管理是当前工作的重点与难点：对于已有临床指南的病种组合，可直接参照指南制定整合路径；对于尚无指南的病种组合，则需要组织多学科专家团队填补临床证据空白，共同制定管理规范。在随访终止机制方面，杜老师介绍了系统的自动终止规则。系统为每位患者设置宽限期，若患者在宽限期内无任何复诊记录，则默认该患者已失访或死亡，系统将自动终止后续随访提醒，避免对无效对象的资源浪费。",
    "<br><strong>三、杨老师分析慢阻肺整合管理路径</strong><br>&emsp;&emsp;分级诊疗政策提出多年，但实际运行效果不佳，核心原因在于未能针对具体病种明确各级医疗机构在各环节的重点职责分工。建议从真实世界运行堵点出发设计整合式路径，以提升研究的实践价值。关于服务包模式，国家医保局于2026年3月发布的文件已明确支持将基本医疗、公共卫生、健康管理、康复等服务内容进行打包整合。若华西制定的管理路径能够为基层提供兜底保障（如开通绿色转诊通道），将有效增强患者对基层服务的信任度。<br>&emsp;&emsp;华西作为区域医疗中心，应聚焦急性期患者和复杂病例的管理，包括慢阻肺急性加重期、术后患者及多种共病患者。轻症患者（如稳定期慢阻肺）可依据华西制定的标准化路径在基层接受管理，仅在出现急性加重或病情变化时上转至三甲医院。这种分工既符合国家分级诊疗的政策导向，也有利于华西优质医疗资源的合理配置。此外，建议课题在路径设计中充分考虑数字化工具的嵌入，以提升管理效率和可推广性。",
    "<br><strong>四、后续工作安排</strong><br>（1）课题二项目组与华西团队建立季度沟通机制，每季度交流一次工作进展，课题方负责整理会议纪要并及时反馈。<br>（2）各方继续推进整合式路径的系统开发与内容细化，以慢阻肺作为聚焦病种，患者分层管理与共病管理作为课题特色方向。<br>（3）在现有工作基础上研究未来试点方案，探索“华西路径+基层执行+系统支撑”的可推广运行模式。"

        "<br><strong>一、赖泓宇老师介绍项目研究背景与进展</strong><br>&emsp;&emsp;本课题并非追求从0到1的技术突破，而是想要整合现有医疗资源，总结出一套可落地、可推广的整合式智慧慢病管理路径，重点解决现有技术推广难、资源利用率低的问题。讲解过程梳理了整合医疗理念的发展历程，从1978年的基层医疗整合，到2000年的以人为中心的全生命周期整合，再到当前的数字化技术嵌入整合。慢性病的长期性特征决定了信息与数据是实现资源串联的核心要素。课题提出了宏观即在系统组织层面与微观层面在临床服务层面相结合的整合模型。明确了管理路径、临床路径与患者就医路径的区别。下一步将结合具体病种和场景，对现有的路径图进行完善修改。",
        "<br><strong>二、杨霞老师分享中医可以如何参与慢病管理</strong><br>&emsp;&emsp;<strong>（一）中医可以参与慢病管理的环节</strong><br>&emsp;&emsp;预防：中医可在疾病预防阶段发挥作用，如糖尿病、高血压、高血脂前期的干预，体现治未病理念。<br>&emsp;&emsp;治疗：在规范化西医治疗基础上，融入穴位埋线等中医特色外治法及药物治疗。<br>&emsp;&emsp;康复：参与心脏康复、肺功能康复以及脑梗脑出血后遗症期的肢体功能康复。<br>&emsp;&emsp;<strong>（二）穴位埋线技术推广</strong><br>&emsp;&emsp;中医院的穴位埋线技术是目前医院的特色创新，效果也比较好，在未来想向外推广，目前面临一定的困难。因作为一项有创操作，申请指定标准受限，只能制定企业标准。但目前想要对其进行更大范围的推广，产生一定的影响力，便于基层学习则需要形成一套量化标准。讨论建议通过量化临床效果、建立可复制的标准体系，并依托疾控、民政或党建服务等现有组织体系进行小范围试点，积累数据并形成学术产出。<br>&emsp;&emsp;<strong>（三）患者选择</strong><br>&emsp;&emsp;患者选择中医原因：患者选择中医治疗的原因包括信赖中医理念、部分疾病中医治疗效果好等，涵盖各个年龄段的人群，如儿科感冒、骨科理疗等。",
        "<br><strong>三、甘洪桥老师分享糖尿病慢病管理现存问题</strong><br>&emsp;&emsp;现阶段的工作可参考的东西很多，例如各个国家、平台、组织发布的指南，如何整合从而形成一个统一的参考。糖尿病涉及一个长期管理，包括一级二级三级预防，这些环节涉及的任务需要明确是谁来承担，这些举措有没有经费政策的支持。未来研究对于糖尿病的关注点应该在前期，糖尿病前期防控的任务需要落到实处。<br>&emsp;&emsp;<strong>想法1：</strong>社区医生的重要性，进入家庭，建立档案，全方位的考察。<br>&emsp;&emsp;<strong>想法2：</strong>在AI时代，怎样提升医疗机构的可信度，建立一个有效的信息渠道/平台，便于居民获取可靠的健康信息。<br>&emsp;&emsp;<strong>想法3：</strong>糖尿病前期和中医的结合，中医应该更多的放在治未病的预防阶段。<br>&emsp;&emsp;<strong>想法4：</strong>门特的管理，放在基层/有专门的科室。",
        "<br><strong>四、老师们分享基层医疗与慢病管理</strong><br>&emsp;&emsp;慢病防控的重心依然在基层。基层医疗是慢病管理的重心，应承担健康促进、预防保健等基础工作。家庭医生需深入了解患者家庭情况，建立档案，进行健康指导和干预。目前基层医疗机构存在人手不足、药物缺乏、医生待遇激励机制不完善等问题，导致患者在基层留不住，医疗资源利用不合理。同时应加大投入对于全科医生的培养，全科医生需了解多学科知识，能处理常见疾病并及时上转。目前全科医疗专业较少，培养难度大。需完善全科医生激励机制，提高待遇，增强其工作积极性和责任感。",
        "<br><strong>五、共同商讨患者干预与研究计划</strong><br>&emsp;&emsp;<strong>（一）患者干预思路</strong><br>&emsp;&emsp;研究对象：主要关注心血管和代谢类疾病患者，以年轻住院患者为研究对象，分析其发病原因，挖掘原因背后的社会健康决定因素，如职业、生活方式、饮食习惯等。<br>&emsp;&emsp;干预方式：通过深度访谈了解患者情况，结合中医理念制定干预方案，如改变生活方式、控制危险因素等。<br>&emsp;&emsp;问卷设计：设计调查问卷，涵盖职业、生活环境、饮食习惯等内容，确保调查结果的科学性和可靠性。<br>&emsp;&emsp;<strong>（二）研究计划安排</strong><br>&emsp;&emsp;第一、二季度：开展焦点小组访谈，梳理心血管和代谢类疾病结合中医特色的管理路径，找出断点和问题。<br>&emsp;&emsp;第三季度：针对问题提出改善建议，实施干预措施，提高慢病管理效果。<br>&emsp;&emsp;<strong>（三）后续工作计划</strong><br>&emsp;&emsp;在4月底或5月中旬出初级访谈提纲，与中医院老师对接讨论完善提纲。按照完善后的提纲挑选患者进行访谈，共同处理资料，形成有价值的成果。持续推进项目，争取在年底形成可推广的模式，为慢病管理提供有效解决方案。"
