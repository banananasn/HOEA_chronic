    "<br><strong>二、杜春霖老师介绍整合式共病管理工作</strong><br>&emsp;&emsp;整合式路径的设计理念是将患者的就医需求转化为临床可执行的管理方案，聚焦三个核心维度：疾病类型（单病或共病）、病情严重程度（轻中重分层）、随访周期（短期与长期）。该路径不同于传统的临床路径或单纯的就医路径，而是强调“整合”概念，具体体现在以下几个方面：一是患病类型的整合，从单病逐步向共病延伸；二是路径类型的整合，将基于指南共识的标准化临床管理路径与基于医师医嘱的动态路径相结合；三是随访周期的整合，区分短期管理与长期随访。<br>&emsp;&emsp;在系统建设方面，目前已实现基于患者画像的动态路径生成功能。该功能以患者的就诊记录为数据源头，可自动生成个体化的离院后管理路径。但当前临床实践中存在一个突出问题：医师书写的动态路径多聚焦于短期随访，大量需要长期管理的慢性病患者在出院一年后缺乏系统性的管理安排，形成管理空白。在路径整合的具体规则方面，对于短期随访，当标准化临床路径与医师动态路径在时间节点上存在冲突时，系统将设定合并周期，对临近时间节点的任务和内容进行整合，避免对患者的重复提醒；对于长期随访，以标准化临床路径的管理要求为主。关于基层协作机制，杜老师提出了服务包模式的设想，由华西专家团队制定管理方案，基层医疗机构负责具体执行，收益按工作量进行分配。<br>&emsp;&emsp;当前以慢阻肺作为切入点，通过文献检索与AI工具辅助，初步整理出急性加重期、稳定期及合并其他疾病等不同类型的临床管理路径，后续将通过专家论证最终形成华西专家共识认证的标准化管理路径。考虑到慢阻肺患者群体规模庞大，传统的以人工为主的随访管理方式难以实现全覆盖，必须依托信息化系统进行数字化管理。共病管理是当前工作的重点与难点：对于已有临床指南的病种组合，可直接参照指南制定整合路径；对于尚无指南的病种组合，则需要组织多学科专家团队填补临床证据空白，共同制定管理规范。在随访终止机制方面，杜老师介绍了系统的自动终止规则。系统为每位患者设置宽限期，若患者在宽限期内无任何复诊记录，则默认该患者已失访或死亡，系统将自动终止后续随访提醒，避免对无效对象的资源浪费。",
    "<br><strong>三、杨老师分析慢阻肺整合管理路径</strong><br>&emsp;&emsp;分级诊疗政策提出多年，但实际运行效果不佳，核心原因在于未能针对具体病种明确各级医疗机构在各环节的重点职责分工。建议从真实世界运行堵点出发设计整合式路径，以提升研究的实践价值。关于服务包模式，国家医保局于2026年3月发布的文件已明确支持将基本医疗、公共卫生、健康管理、康复等服务内容进行打包整合。若华西制定的管理路径能够为基层提供兜底保障（如开通绿色转诊通道），将有效增强患者对基层服务的信任度。<br>&emsp;&emsp;华西作为区域医疗中心，应聚焦急性期患者和复杂病例的管理，包括慢阻肺急性加重期、术后患者及多种共病患者。轻症患者（如稳定期慢阻肺）可依据华西制定的标准化路径在基层接受管理，仅在出现急性加重或病情变化时上转至三甲医院。这种分工既符合国家分级诊疗的政策导向，也有利于华西优质医疗资源的合理配置。此外，建议课题在路径设计中充分考虑数字化工具的嵌入，以提升管理效率和可推广性。",

]

        "<strong>时间：</strong>2026年4月15日下午15:00<br><strong>地点：</strong>四川省中医药科学院中医研究所医院行政楼一楼会议室<br><strong>参会人员：</strong><br>&emsp;&emsp;甘洪桥 四川省中医药科学院中医研究所（四川省第二中医医院）内分泌科主任<br>&emsp;&emsp;杨  霞 四川省中医药科学院中医研究所（四川省第二中医医院）心病科主任<br>&emsp;&emsp;陈金凤 四川省中医药科学院中医研究所（四川省第二中医医院）药理室主管中药师<br>&emsp;&emsp;赖泓宇 四川大学华西公共卫生学院/华西第四医院助理研究员<br>&emsp;&emsp;蒋瀚鸿 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>&emsp;&emsp;李诗懿 四川大学华西公共卫生学院/华西第四医院本科生",
        "<br><strong>一、赖泓宇老师介绍项目研究背景与进展</strong><br>&emsp;&emsp;本课题并非追求从0到1的技术突破，而是想要整合现有医疗资源，总结出一套可落地、可推广的整合式智慧慢病管理路径，重点解决现有技术推广难、资源利用率低的问题。讲解过程梳理了整合医疗理念的发展历程，从1978年的基层医疗整合，到2000年的以人为中心的全生命周期整合，再到当前的数字化技术嵌入整合。慢性病的长期性特征决定了信息与数据是实现资源串联的核心要素。课题提出了宏观即在系统组织层面与微观层面在临床服务层面相结合的整合模型。明确了管理路径、临床路径与患者就医路径的区别。下一步将结合具体病种和场景，对现有的路径图进行完善修改。",
        "<br><strong>二、杨霞老师分享中医可以如何参与慢病管理</strong><br>&emsp;&emsp;<strong>（一）中医可以参与慢病管理的环节</strong><br>&emsp;&emsp;预防：中医可在疾病预防阶段发挥作用，如糖尿病、高血压、高血脂前期的干预，体现治未病理念。<br>&emsp;&emsp;治疗：在规范化西医治疗基础上，融入穴位埋线等中医特色外治法及药物治疗。<br>&emsp;&emsp;康复：参与心脏康复、肺功能康复以及脑梗脑出血后遗症期的肢体功能康复。<br>&emsp;&emsp;<strong>（二）穴位埋线技术推广</strong><br>&emsp;&emsp;中医院的穴位埋线技术是目前医院的特色创新，效果也比较好，在未来想向外推广，目前面临一定的困难。因作为一项有创操作，申请指定标准受限，只能制定企业标准。但目前想要对其进行更大范围的推广，产生一定的影响力，便于基层学习则需要形成一套量化标准。讨论建议通过量化临床效果、建立可复制的标准体系，并依托疾控、民政或党建服务等现有组织体系进行小范围试点，积累数据并形成学术产出。<br>&emsp;&emsp;<strong>（三）患者选择</strong><br>&emsp;&emsp;患者选择中医原因：患者选择中医治疗的原因包括信赖中医理念、部分疾病中医治疗效果好等，涵盖各个年龄段的人群，如儿科感冒、骨科理疗等。",
        "<br><strong>三、甘洪桥老师分享糖尿病慢病管理现存问题</strong><br>&emsp;&emsp;现阶段的工作可参考的东西很多，例如各个国家、平台、组织发布的指南，如何整合从而形成一个统一的参考。糖尿病涉及一个长期管理，包括一级二级三级预防，这些环节涉及的任务需要明确是谁来承担，这些举措有没有经费政策的支持。未来研究对于糖尿病的关注点应该在前期，糖尿病前期防控的任务需要落到实处。<br>&emsp;&emsp;<strong>想法1：</strong>社区医生的重要性，进入家庭，建立档案，全方位的考察。<br>&emsp;&emsp;<strong>想法2：</strong>在AI时代，怎样提升医疗机构的可信度，建立一个有效的信息渠道/平台，便于居民获取可靠的健康信息。<br>&emsp;&emsp;<strong>想法3：</strong>糖尿病前期和中医的结合，中医应该更多的放在治未病的预防阶段。<br>&emsp;&emsp;<strong>想法4：</strong>门特的管理，放在基层/有专门的科室。",
        "<br><strong>四、老师们分享基层医疗与慢病管理</strong><br>&emsp;&emsp;慢病防控的重心依然在基层。基层医疗是慢病管理的重心，应承担健康促进、预防保健等基础工作。家庭医生需深入了解患者家庭情况，建立档案，进行健康指导和干预。目前基层医疗机构存在人手不足、药物缺乏、医生待遇激励机制不完善等问题，导致患者在基层留不住，医疗资源利用不合理。同时应加大投入对于全科医生的培养，全科医生需了解多学科知识，能处理常见疾病并及时上转。目前全科医疗专业较少，培养难度大。需完善全科医生激励机制，提高待遇，增强其工作积极性和责任感。",
        "<br><strong>五、共同商讨患者干预与研究计划</strong><br>&emsp;&emsp;<strong>（一）患者干预思路</strong><br>&emsp;&emsp;研究对象：主要关注心血管和代谢类疾病患者，以年轻住院患者为研究对象，分析其发病原因，挖掘原因背后的社会健康决定因素，如职业、生活方式、饮食习惯等。<br>&emsp;&emsp;干预方式：通过深度访谈了解患者情况，结合中医理念制定干预方案，如改变生活方式、控制危险因素等。<br>&emsp;&emsp;问卷设计：设计调查问卷，涵盖职业、生活环境、饮食习惯等内容，确保调查结果的科学性和可靠性。<br>&emsp;&emsp;<strong>（二）研究计划安排</strong><br>&emsp;&emsp;第一、二季度：开展焦点小组访谈，梳理心血管和代谢类疾病结合中医特色的管理路径，找出断点和问题。<br>&emsp;&emsp;第三季度：针对问题提出改善建议，实施干预措施，提高慢病管理效果。<br>&emsp;&emsp;<strong>（三）后续工作计划</strong><br>&emsp;&emsp;在4月底或5月中旬出初级访谈提纲，与中医院老师对接讨论完善提纲。按照完善后的提纲挑选患者进行访谈，共同处理资料，形成有价值的成果。持续推进项目，争取在年底形成可推广的模式，为慢病管理提供有效解决方案。"
    ]
                },
                260417_1: {
                    title: "“整合式智慧慢病管理模式研究”课题<br>项目组赴成都高新区桂溪社区卫生服务中心开展调研学习会议纪要",
                    date: "2026年4月17日",
                    image: "images/interview/260417桂溪.jpg",
                    paragraphs: [
        "<strong>时间：</strong>2026年4月17日下午15:00<br><strong>地点：</strong>桂溪社区卫生服务中心（成都高新区）<br><strong>参会人员：</strong><br>&emsp;&emsp;常晓宇 四川省疾病预防控制中心慢性非传染性疾病预防控制与研究所副主任医师<br>&emsp;&emsp;王  琼 成都市疾病预防控制中心慢性非传染性疾病预防控制科业务主管/主任医师<br>&emsp;&emsp;赖佳伟 成都市疾病预防控制中心慢性非传染性疾病预防控制科科员/主管医师<br>&emsp;&emsp;张颖聪 成都高新区疾病预防控制中心慢性病防制科副科长<br>&emsp;&emsp;李  鑫 桂溪社区卫生服务中心副主任<br>&emsp;&emsp;吕先之 桂溪社区卫生服务中心公共卫生部副部长<br>&emsp;&emsp;冯  慧 桂溪社区卫生服务中心家医慢病工作组组长<br>&emsp;&emsp;曹茂琳 桂溪社区卫生服务中心家医慢病工作组副组长<br>&emsp;&emsp;陈  慧 桂溪社区卫生服务中心临床全科医生<br>&emsp;&emsp;赖泓宇 四川大学华西公共卫生学院/华西第四医院助理研究员、课题联络人、课题骨干<br>&emsp;&emsp;蒋瀚鸿 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>&emsp;&emsp;周楚帆 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>&emsp;&emsp;石  娜 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>&emsp;&emsp;李诗懿 四川大学华西公共卫生学院/华西第四医院硕士研究生",
        "<br><strong>一、课题背景与调研目的</strong><br>&emsp;&emsp;本次调研系“整合式智慧慢病管理模式研究”课题项目组赴成都高新区桂溪社区卫生服务中心开展的实地调研活动。调研由四川大学华西公共卫生学院/华西第四医院助理研究员赖泓宇带队，代表国家重大科技专项课题执行方，就基层慢病管理现状、创新举措及合作可能性与桂溪社区卫生服务中心相关负责人进行深入交流。<br>&emsp;&emsp;本课题定位于从1到100的应用创新，旨在收集基层真实世界经验，凝练可推广的示范样板。去年已在德阳市罗江区打造紧密型县医共体样板，今年计划在高新区重点打造职业人群慢病管理样板，并向全省推广。本次调研核心目标包括：了解基层慢病管理中的堵点与难点；收集中心基本情况及辖区服务人口数据；梳理中心现有创新举措及成效，为课题设计提供实证依据。",
        "<br><strong>二、桂溪社区卫生服务中心基本情况介绍</strong><br>&emsp;&emsp;<strong>（一）团队构成与服务人口</strong><br>&emsp;&emsp;中心副主任李鑫介绍，桂溪社区卫生服务中心现设公共卫生部、家庭医生团队及慢病管理等职能部门。中心辖区核定公共卫生管理人口18万余人，实际服务人口逾30万人。<br>&emsp;&emsp;2026年度慢病管理任务指标为：高血压管理9400余例、糖尿病管理4300余例、慢阻肺管理500余例。截至第一季度，高血压已完成7000余例、糖尿病完成3000余例、慢阻肺完成275例，整体进度较好，但距规范管理标准仍有差距，市级要求一季度达标率100%，目前尚未全部达标，可能影响后续考核。<br>&emsp;&emsp;<strong>（二）慢病管理核心举措</strong><br>&emsp;&emsp;关口前移：对35岁以上首诊患者常规测量血压，以此为切入点开展慢病早期筛查，将防治关口前移至疾病发生前。<br>&emsp;&emsp;医防融合：建立慢病管理服务中心，整合预防、诊疗、随访与康复等全周期服务功能；通过基本公共卫生服务和健康体检筛查慢病高风险人群，对高风险人群实施非药物干预；诊疗系统与基本公共卫生服务系统数据互通，医生可直接查阅患者公共卫生服务信息，公卫人员可调取患者就诊情况和诊疗数据；定期对医务人员开展慢病防治技能培训，全面提升综合服务能力。<br>&emsp;&emsp;健康激励：推行健康存折与健康积分制度，引导居民主动开展自我健康管理。慢病患者签约免费家庭医生A包可获得60分基础积分，定期随访、遵医行为良好、参与健康教育讲座等均可累加积分，积分可兑换健康管理服务，目前已激励千余名居民参与。<br>&emsp;&emsp;资源整合与服务创新：组建“2+N”科普宣讲团，以基本医疗和公共卫生服务为两翼，综合预防保健、妇幼管理、中药服务等特色单元，依据辖区企业、社区、学校等场景需求，提供个性化健康服务。宣讲效果通过服务场次统计和满意度调查评估，并同步收集下一年度工作需求。",
        "<br><strong>三、重点交流议题</strong><br>&emsp;&emsp;<strong>（一）信息化与数据打通情况</strong><br>&emsp;&emsp;高新区计划于2026年6月将辖区健康数据接入全省健康云档案平台。目前数据存储于政务云，由数据公司负责完善和系统维护。区级层面已实现基本公卫系统与医疗系统数据互联互通，医生可直接查阅患者区级就诊记录；医疗系统亦可调取患者随访档案，为连续性健康管理奠定数据基础。<br>&emsp;&emsp;<strong>（二）职业人群慢病管理特点与难点</strong><br>&emsp;&emsp;高新区职业人群以中青年为主，普遍存在工作生活压力大、节奏快、无暇体检、生病拖延等问题；饮食不规律、运动不足现象突出。区级层面已推行工间操以改善久坐少动状态。<br>&emsp;&emsp;在依从性方面，中年男性群体依从性明显偏低，对医生建议重视程度不足；教育文化程度较高的自由职业者、经营者群体也存在较为普遍的依从性问题。据桂溪社区卫生服务中心工作人员介绍，高知人群（如和平站三瓦窑社区居民）对基层医疗服务认可度低，慢病管理依从性差；而南北区回迁院落老年人虽文化和经济水平较低，但对服务满意度高，通过礼品赠送和健康银行激励政策可能提升依从性。<br>&emsp;&emsp;<strong>（三）流动人口服务策略</strong><br>&emsp;&emsp;中心主动深入社区，与街道办事处和社区居委会紧密合作，积极赴外卖骑手服务站、辖区企业等场所开展健康教育和健康咨询活动。主动服务模式不仅扩大了服务覆盖面，也对家庭医生团队业绩考核和激励机制形成正向反哺。<br>&emsp;&emsp;<strong>（四）医疗集团与医联体协作机制</strong><br>&emsp;&emsp;据介绍，桂溪社区卫生服务中心与成都市中西医结合医院共同组建城市医疗集团，双方合作紧密。心内科主任提出建立联合病房，专科医生可随叫随到，实现专科资源有效下沉。目前以家庭医生服务形式推行个案全病程管理，三甲医院通过购买社区家庭医生服务方式强化转诊协作。<br>&emsp;&emsp;在医保支付方面，新文件明确规定三甲医院术后患者下转社区无住院门槛费，社区转三甲医院则补齐差价，政策引导双向转诊逐步落地。<br>&emsp;&emsp;社区卫生服务中心和区级指导中心结合档案抽查、信息平台全档案逻辑质控、AI语音电话抽查质控等方式进一步提升档案质量。不同类型AI的问题应答率存在差异，系统迭代后综合性能有所提升，但成本亦相应增加。<br>&emsp;&emsp;<strong>（五）特色专科建设与家庭医生服务</strong><br>&emsp;&emsp;中心正积极推进全专结合门诊建设，对全科医生开展专病方向培养，并在挂号环节实现患者病情的指向性分诊。已开设的特色门诊包括：骨质疏松门诊（与上级医院合作）、癌痛管理门诊（试点后向各中心推广）、心理卫生门诊（就诊人次持续增长，通过增加开诊天数满足需求）。部分门诊因受众群体规模较小、居民认知不足等原因（如肾病门诊、营养门诊）未能持续运营，后对肾病门诊进行调整，与糖尿病管理相结合。<br>&emsp;&emsp;在家庭医生签约方面，中心正积极推进以家庭和企业集体为单位的签约模式。但推行要求签约居民就诊须经家庭医生首诊的机制面临一定困难，现阶段主要鼓励医生留住签约居民及其家庭成员。<br>&emsp;&emsp;<strong>（六）紧密型城市医疗集团建设经验</strong><br>&emsp;&emsp;中心结合自身实践，梳理了紧密型城市医疗集团建设的关键要点：一是观念转变，三甲医院需充分认识社区卫生服务中心的优势，形成平等合作关系；二是精准对接，基层机构需结合社区实际发展特点，明确自身需求，找准合适的合作切入点；三是强化执行与总结，选配执行力强的对接人员，建立述职推进和成效分析机制。<br>&emsp;&emsp;高新区基层机构协作良好，源于其早期由街道办事处管理的历史沿革，现与街道办事处、社区居委会、疾控中心形成了良好协作关系，为开展基层健康管理工作提供了有力支撑。",
        "<br><strong>四、职业健康干预与高端服务包探索</strong><br>&emsp;&emsp;调研中重点交流了以企业为单位开展职业健康干预的可行性。课题组介绍，美国在企业职工健康管理领域经验丰富，以企业为单位实施健康干预效果显著。高新区具备相关资源基础，具备进一步合作空间。<br>&emsp;&emsp;高新区已积累一定实践经验：西园街道富士康厂区已建立体检系统，中心配套设置健康小屋开展健康宣教；此前曾针对特定人群开展挂号费减免活动，并与美团等外卖平台企业及社会工作部对接，探索健康服务有效路径。<br>&emsp;&emsp;关于职工健康服务包的设计思路，桂溪社区卫生服务中心建议从企业侧入手，根据企业对中医干预等特色服务的需求量身定制服务内容，并将健康讲座等服务纳入服务包体系，通过邀请医联体专家开展讲座提升企业用户黏性。",
        "<br><strong>五、后续工作安排</strong><br>&emsp;&emsp;课题合作推进：由四川大学华西公共卫生学院/华西第四医院课题组赖泓宇老师与省、市、区疾控中心和桂溪社区卫生服务中心相关人员进一步沟通协调，深入探讨在高新区打造职业人群慢病管理样板课题的实施意义与推广价值，研究具体合作方案。<br>&emsp;&emsp;家庭医生签约工作：中心将根据上级“六个拓展做实家庭医生服务”征求意见结果，积极推进以家庭和企业集体为单位的家庭医生签约工作，不断探索签约服务新模式。<br>&emsp;&emsp;持续优化服务质量：中心将持续完善慢病管理路径、深化医防融合机制，借助AI等信息化手段提升慢病患者自我管理效能，降低慢病患者二次就医率，全面提升辖区居民健康素养和服务满意度。<br>&emsp;&emsp;数据接入：目前高新区医疗健康服务使用区级平台，将于2026年6月接入全省健康云档案平台，进一步为课题研究提供数据支持。"
    ]
