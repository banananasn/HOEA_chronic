                    data："2026年4月8日",
                    image: "images/interview/260407省肿瘤.jpg",
                    paragraphs: [
                        "<strong>时间：</strong>2026年4月7日上午9:00<br><strong>地点：</strong>四川省肿瘤医院行政楼四楼会议室<br><strong>参会人员：</strong><br>&emsp;&emsp;乔  良 四川省肿瘤医院省癌症防治中心办公室副主任<br>&emsp;&emsp;刘潇霞 四川省肿瘤医院省癌症防治中心办公室副主任医师<br>&emsp;&emsp;赖泓宇 四川大学华西公共卫生学院/华西第四医院助理研究员<br>&emsp;&emsp;陈玺玥 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>&emsp;&emsp;周楚帆 四川大学华西公共卫生学院/华西第四医院硕士研究生",
                        "<br><strong>一、赖泓宇老师介绍课题背景</strong><br>&emsp;&emsp;整合在医疗服务领域的理念源于世界卫生组织初级卫生保健会议对跨部门协作的倡议，发展至今已逐步转向以人为中心，强调个性化服务与数据互通精准匹配。由于慢性病具有长期性、持续性及可管理性的特点，慢性病管理对数据监测与反馈提出了更高的信息支持需求。整合式慢病管理路径应聚焦微观层面的“防—诊—控—治—康”全链条及多学科协作，与宏观制度与组织整合相区分，并从供方视角进行系统设计。当前制定的路径需进一步细化到具体场景、人群与病种，明确不同层级医疗机构的功能定位，有待进一步优化与完善。",
                        "<br><strong>二、刘潇霞老师介绍肿瘤防治工作</strong><br>&emsp;&emsp;肿瘤防治工作分数据与服务两条线，在数据层面，收集癌症发病的监测风险评估数据和死亡复发的随访数据，实现对人群健康状况的动态掌握与管理；在服务层面，依托医联体等省、市、县三级癌症防治体系形成互转机制，由社区卫生服务中心承担风险评估与居家随访，具备筛查资质的二级及以上医疗机构负责筛查、诊断与规范治疗，其中治疗环节涵盖主要治疗、支持性治疗与康复治疗，基层医疗机构参与部分支持性及康复服务，并进行向上转诊。",
                        "<br><strong>三、乔良老师分析肿瘤管理路径</strong><br>&emsp;&emsp;肿瘤管理路径的着手点在于癌症筛查和早诊早治。癌症筛查包括组织性筛查与机会性筛查两种模式。组织性筛查中，由基层医疗机构承担健康宣教和高危人群初筛，上级医疗机构负责进一步临床筛查（如LDCT、胃镜、肠镜、B超）、确诊及早期治疗，并通过分层随访实现闭环管理；而机会性筛查则主要发生在体检机构和日常诊疗过程中，通过高危评估、针对性体检以及临床发现实现早诊早治，同时借助大数据和人工智能对既往就诊信息进行分析，提高高危人群识别效率。其中，体检等主动筛查的检出率较低，而因症状主动就诊的人群检出率更高。筛查常见癌种包括上呼吸道癌、消化道癌、结直肠癌、肺癌、乳腺癌和肝癌等，其中肺癌筛查依从性相对较好，但确诊路径较长，易造成人群流失。为提升整体效果，国家倡导多癌种联合筛查，以更好匹配不同人群的风险特征。<br>&emsp;&emsp;在分级管理实施过程中，基层仍面临现实条件的约束。相比于高血压、糖尿病等其他慢性病，癌症的高危评估与随访尚未完全纳入基本公共卫生服务体系，基层更多承担健康教育和基础筛查功能。在医药方面，基层医疗机构药品目录受限，优质药物可及性不足，影响患者下转后的康复管理，需通过提升基层医生非药物干预能力以及借助互联网医院开通绿色通道等方式弥补；在医保方面，医保支付政策尚不统一，筛查费用保障不足，苏州等地区已探索政府投入与商业保险结合的模式，以降低居民筛查负担，也有部分地区在医共体按人头付费机制下，通过激励相容有效提升了基层预防和筛查动力，体现出制度设计对肿瘤管理路径落地的重要影响。同时，智能化手段在筛查和早诊环节具有较大潜力，尤其是在高危人群识别和随访管理方面，但当前应用仍处于探索阶段。<br>&emsp;&emsp;此外，不同地区与人群特征也显著影响肿瘤管理路径的实施效果。少数民族地区肿瘤发病水平相对较低，可能受限于监测体系不完善及就医行为不足，存在数据低估问题，且筛查推广面临宗教文化和认知障碍，参与度有待提升。在选择管理模式推广的试点地区时，应注意偏远地区居民健康意识较弱，主动参与筛查的意愿不足，需依托长期健康教育逐步引导。",

                260408: {
                    title: "“整合式智慧慢病管理模式研究”课题<br>项目组赴华西医院开展调研学习会议纪要",
                    date: "2026年4月8日",
                    image: "images/interview/260408华西.jpg",
                    paragraphs: [
    "<strong>时间：</strong>2026年4月8日上午10:00"<br><strong>地点：</strong>四川大学华西医院（高原医学研究中心）<br><strong>参会人员：</strong><br>&emsp;&emsp;杜春霖 华西医院门诊部（互联网医院管理办公室）/全程共病管理中心统计师<br>&emsp;&emsp;杨先碧 华西医院全程共病管理中心数据库组组长<br>&emsp;&emsp;谭智文 华西医院全程共病管理中心<br>&emsp;&emsp;赖泓宇 四川大学华西公共卫生学院/华西第四医院助理研究员<br>&emsp;&emsp;蒋瀚鸿 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>&emsp;&emsp;周楚帆 四川大学华西公共卫生学院/华西第四医院硕士研究生",
    "<br><strong>一、赖泓宇老师介绍课题背景与调研现状</strong><br>&emsp;&emsp;本课题系政策导向型研究，政策设计需依托真实世界数据与落地实践。当前分级诊疗体系运行存在梗阻，以糖尿病、慢阻肺为代表的常见慢性病患者仍大量集中至三甲医疗机构，基层服务能力不足且缺乏长效激励机制。建议在现有工作基础上探索试点方案，可选取典型区县开展整合模式试验。<br>&emsp;&emsp;对于四大慢病主要疾病之一的慢阻肺，建议对患者实施分层管理：轻中度患者应下沉至基层医疗卫生机构，由华西提供标准化管理路径予以赋能；重症、术后及共病患者则由华西作为重点管理对象。需调取数据明确患者群体分布特征，包括门诊与住院患者比例、轻中重度构成及共病情况，以避免路径设计与基层形成资源竞争。在效果评估方面，可采用前后对照或统计学方法，不必强行要求随机对照试验设计，肺功能指标可作为慢阻肺管理效果的重要观察依据。",
    "<br><strong>二、杜春霖老师介绍整合式共病管理工作</strong><br>&emsp;&emsp;整合式路径的设计理念是将患者的就医需求转化为临床可执行的管理方案，聚焦三个核心维度：疾病类型（单病或共病）、病情严重程度（轻中重分层）、随访周期（短期与长期）。该路径不同于传统的临床路径或单纯的就医路径，而是强调“整合”概念，具体体现在以下几个方面：一是患病类型的整合，从单病逐步向共病延伸；二是路径类型的整合，将基于指南共识的标准化临床管理路径与基于医师医嘱的动态路径相结合；三是随访周期的整合，区分短期管理与长期随访。<br>&emsp;&emsp;在系统建设方面，目前已实现基于患者画像的动态路径生成功能。该功能以患者的就诊记录为数据源头，可自动生成个体化的离院后管理路径。但当前临床实践中存在一个突出问题：医师书写的动态路径多聚焦于短期随访，大量需要长期管理的慢性病患者在出院一年后缺乏系统性的管理安排，形成管理空白。在路径整合的具体规则方面，对于短期随访，当标准化临床路径与医师动态路径在时间节点上存在冲突时，系统将设定合并周期，对临近时间节点的任务和内容进行整合，避免对患者的重复提醒；对于长期随访，以标准化临床路径的管理要求为主。关于基层协作机制，杜老师提出了服务包模式的设想，由华西专家团队制定管理方案，基层医疗机构负责具体执行，收益按工作量进行分配。<br>&emsp;&emsp;当前以慢阻肺作为切入点，通过文献检索与AI工具辅助，初步整理出急性加重期、稳定期及合并其他疾病等不同类型的临床管理路径，后续将通过专家论证最终形成华西专家共识认证的标准化管理路径。考虑到慢阻肺患者群体规模庞大，传统的以人工为主的随访管理方式难以实现全覆盖，必须依托信息化系统进行数字化管理。共病管理是当前工作的重点与难点：对于已有临床指南的病种组合，可直接参照指南制定整合路径；对于尚无指南的病种组合，则需要组织多学科专家团队填补临床证据空白，共同制定管理规范。在随访终止机制方面，杜老师介绍了系统的自动终止规则。系统为每位患者设置宽限期，若患者在宽限期内无任何复诊记录，则默认该患者已失访或死亡，系统将自动终止后续随访提醒，避免对无效对象的资源浪费。",
    "<br><strong>三、杨老师分析慢阻肺整合管理路径</strong><br>&emsp;&emsp;分级诊疗政策提出多年，但实际运行效果不佳，核心原因在于未能针对具体病种明确各级医疗机构在各环节的重点职责分工。建议从真实世界运行堵点出发设计整合式路径，以提升研究的实践价值。关于服务包模式，国家医保局于2026年3月发布的文件已明确支持将基本医疗、公共卫生、健康管理、康复等服务内容进行打包整合。若华西制定的管理路径能够为基层提供兜底保障（如开通绿色转诊通道），将有效增强患者对基层服务的信任度。<br>&emsp;&emsp;华西作为区域医疗中心，应聚焦急性期患者和复杂病例的管理，包括慢阻肺急性加重期、术后患者及多种共病患者。轻症患者（如稳定期慢阻肺）可依据华西制定的标准化路径在基层接受管理，仅在出现急性加重或病情变化时上转至三甲医院。这种分工既符合国家分级诊疗的政策导向，也有利于华西优质医疗资源的合理配置。此外，建议课题在路径设计中充分考虑数字化工具的嵌入，以提升管理效率和可推广性。",
    "<br><strong>四、后续工作安排</strong><br>（1）课题二项目组与华西团队建立季度沟通机制，每季度交流一次工作进展，课题方负责整理会议纪要并及时反馈。<br>（2）各方继续推进整合式路径的系统开发与内容细化，以慢阻肺作为聚焦病种，患者分层管理与共病管理作为课题特色方向。<br>（3）在现有工作基础上研究未来试点方案，探索“华西路径+基层执行+系统支撑”的可推广运行模式。"
]
