                    image: "images/interview/260407省肿瘤.jpg",
                    paragraphs: [
                        "<strong>时间：</strong>2026年4月7日上午9:00",
                        "<strong>地点：</strong>四川省肿瘤医院行政楼四楼会议室",
                        "<strong>参会人员：</strong><br>乔  良 四川省肿瘤医院省癌症防治中心办公室副主任<br>刘潇霞 四川省肿瘤医院省癌症防治中心办公室副主任医师<br>赖泓宇 四川大学华西公共卫生学院/华西第四医院助理研究员<br>陈玺玥 四川大学华西公共卫生学院/华西第四医院硕士研究生<br>周楚帆 四川大学华西公共卫生学院/华西第四医院硕士研究生",
                        "<br><strong>一、赖泓宇老师介绍课题背景</strong><br>&emsp;&emsp;整合在医疗服务领域的理念源于世界卫生组织初级卫生保健会议对跨部门协作的倡议，发展至今已逐步转向以人为中心，强调个性化服务与数据互通精准匹配。由于慢性病具有长期性、持续性及可管理性的特点，慢性病管理对数据监测与反馈提出了更高的信息支持需求。整合式慢病管理路径应聚焦微观层面的“防—诊—控—治—康”全链条及多学科协作，与宏观制度与组织整合相区分，并从供方视角进行系统设计。当前制定的路径需进一步细化到具体场景、人群与病种，明确不同层级医疗机构的功能定位，有待进一步优化与完善。",
                        "<br><strong>二、刘潇霞老师介绍肿瘤防治工作</strong><br>&emsp;&emsp;肿瘤防治工作分数据与服务两条线，在数据层面，收集癌症发病的监测风险评估数据和死亡复发的随访数据，实现对人群健康状况的动态掌握与管理；在服务层面，依托医联体等省、市、县三级癌症防治体系形成互转机制，由社区卫生服务中心承担风险评估与居家随访，具备筛查资质的二级及以上医疗机构负责筛查、诊断与规范治疗，其中治疗环节涵盖主要治疗、支持性治疗与康复治疗，基层医疗机构参与部分支持性及康复服务，并进行向上转诊。",
                        "<br><strong>三、乔良老师分析肿瘤管理路径</strong><br>&emsp;&emsp;肿瘤管理路径的着手点在于癌症筛查和早诊早治。癌症筛查包括组织性筛查与机会性筛查两种模式。组织性筛查中，由基层医疗机构承担健康宣教和高危人群初筛，上级医疗机构负责进一步临床筛查（如LDCT、胃镜、肠镜、B超）、确诊及早期治疗，并通过分层随访实现闭环管理；而机会性筛查则主要发生在体检机构和日常诊疗过程中，通过高危评估、针对性体检以及临床发现实现早诊早治，同时借助大数据和人工智能对既往就诊信息进行分析，提高高危人群识别效率。其中，体检等主动筛查的检出率较低，而因症状主动就诊的人群检出率更高。筛查常见癌种包括上呼吸道癌、消化道癌、结直肠癌、肺癌、乳腺癌和肝癌等，其中肺癌筛查依从性相对较好，但确诊路径较长，易造成人群流失。为提升整体效果，国家倡导多癌种联合筛查，以更好匹配不同人群的风险特征。<br>&emsp;&emsp;在分级管理实施过程中，基层仍面临现实条件的约束。相比于高血压、糖尿病等其他慢性病，癌症的高危评估与随访尚未完全纳入基本公共卫生服务体系，基层更多承担健康教育和基础筛查功能。在医药方面，基层医疗机构药品目录受限，优质药物可及性不足，影响患者下转后的康复管理，需通过提升基层医生非药物干预能力以及借助互联网医院开通绿色通道等方式弥补；在医保方面，医保支付政策尚不统一，筛查费用保障不足，苏州等地区已探索政府投入与商业保险结合的模式，以降低居民筛查负担，也有部分地区在医共体按人头付费机制下，通过激励相容有效提升了基层预防和筛查动力，体现出制度设计对肿瘤管理路径落地的重要影响。同时，智能化手段在筛查和早诊环节具有较大潜力，尤其是在高危人群识别和随访管理方面，但当前应用仍处于探索阶段。<br>&emsp;&emsp;此外，不同地区与人群特征也显著影响肿瘤管理路径的实施效果。少数民族地区肿瘤发病水平相对较低，可能受限于监测体系不完善及就医行为不足，存在数据低估问题，且筛查推广面临宗教文化和认知障碍，参与度有待提升。在选择管理模式推广的试点地区时，应注意偏远地区居民健康意识较弱，主动参与筛查的意愿不足，需依托长期健康教育逐步引导。",
                        "<br><strong>四、后续工作安排</strong><br>（1）课题二项目组和省肿瘤医院合作制定肿瘤类路径，后续每季度沟通进展，分享工作成果。<br>（2）课题二项目组在4月底做出提纲和完成内容，明确与省肿瘤医院每个季度的工作情况和讨论时间，日常沟通资料需求。<br>（3）分别制定四大慢病不同病种路径，最终集成一本书出版。"
                    ]
                },
