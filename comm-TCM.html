    <link rel="stylesheet" href="styles.css">
    <style>
        /* 项目沟通卡片容器 */
        .communication-cards-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1.6rem;
        }
        /* 单个卡片 - 左右布局，悬浮效果 */
        .comm-card {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .comm-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        /* 左侧图片区域 - 占 20% */
        .comm-card-image {
            flex: 1;
            min-width: 100px;
            max-width: 160px;
            background-color: #ffffff;
            margin: 10px 0 10px 10px;
            padding-left: 15px;
        }
        .comm-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .comm-card:hover .comm-card-image img {
            transform: scale(1.03);
        }
        /* 右侧内容区域 - 占 4 份 */
        .comm-card-content {
            flex: 4;
            padding: 1rem 1.5rem 1rem 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        /* 标题 */
        .comm-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e466e;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            text-align: left !important;
        }
        /* 摘要 */
        .comm-card-summary {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: left;
        }
        /* 日期 */
        .comm-card-date {
            font-size: 0.8rem;
            color: #8B0000;
            text-align: left !important;
        }
        /* 暂无内容提示 */
        .empty-tip {
            text-align: center;
            padding: 3rem;
            color: #999;
            background: #fafafa;
            border-radius: 16px;
            font-style: italic;
        }
        /* 增加整个页面的左右边距 */
        .sub-page-content {
            padding-left: 10% !important;
            padding-right: 10% !important;
        }
    </style>
</head>
